services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      API_DATABASE_URL: sqlite:////app/data/commitflow_web.db
      API_USER_DATA_DIR: /app/data/users
      API_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      API_FRONTEND_URL: http://localhost:5173
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
